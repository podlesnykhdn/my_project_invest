name: Telegram боты

on:
  schedule:
    - cron: '0,30 4-15 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Режим'
        required: true
        default: 'auto'
        type: choice
        options: [auto, morning, alerts, command]

jobs:
  run-bots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Установить зависимости
        run: pip install requests --quiet
      - name: Сборщик данных
        env:
          TINKOFF_TOKEN: ${{ secrets.TINKOFF_TOKEN }}
        run: python collector.py
      - name: Определить режим
        id: mode
        run: |
          INPUT="${{ github.event.inputs.mode }}"
          if [ -n "$INPUT" ]; then echo "mode=$INPUT" >> $GITHUB_OUTPUT
          else echo "mode=auto" >> $GITHUB_OUTPUT; fi
      - name: Ментор
        if: always()
        env:
          MENTOR_BOT_TOKEN: ${{ secrets.MENTOR_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_MODE: ${{ steps.mode.outputs.mode }}
        run: python mentor_bot.py || true
      - name: Советник
        if: always()
        env:
          ADVISOR_BOT_TOKEN: ${{ secrets.ADVISOR_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_MODE: ${{ steps.mode.outputs.mode }}
        run: python advisor_bot.py || true
      - name: Сохранить логи
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add logs/**
          git diff --staged --quiet || git commit -m "logs $(date +%Y-%m-%d_%H%M)"
          git push origin main
