name: Telegram боты

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Режим'
        required: true
        default: 'auto'
        type: choice
        options: [auto, morning, alerts, command]
      chain:
        description: 'Самозапуск цепочки (не трогать)'
        required: false
        default: 'true'

jobs:
  run-bots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Установить зависимости
        run: |
          pip install requests --quiet
          # Устанавливаем сертификат Минцифры РФ для tbank.ru (T-Invest API)
          cd /usr/local/share/ca-certificates
          curl -sk "https://gu-st.ru/content/lending/russian_trusted_root_ca_pem.crt" -o russian_root_ca.crt || true
          curl -sk "https://gu-st.ru/content/lending/russian_trusted_sub_ca_pem.crt" -o russian_sub_ca.crt || true
          update-ca-certificates --verbose 2>/dev/null || true
          # Добавляем в certifi (используется Python urllib и requests)
          curl -sk "https://gu-st.ru/content/lending/russian_trusted_root_ca_pem.crt" >> $(python -c "import certifi; print(certifi.where())") || true
          curl -sk "https://gu-st.ru/content/lending/russian_trusted_sub_ca_pem.crt" >> $(python -c "import certifi; print(certifi.where())") || true
          echo "Сертификаты Минцифры установлены"
      - name: Сборщик данных
        env:
          TINKOFF_TOKEN: ${{ secrets.TINKOFF_TOKEN }}
        run: python collector.py
      - name: Определить режим
        id: mode
        run: |
          INPUT="${{ github.event.inputs.mode }}"
          if [ -n "$INPUT" ]; then echo "mode=$INPUT" >> $GITHUB_OUTPUT
          else echo "mode=auto" >> $GITHUB_OUTPUT; fi
      - name: Ментор
        if: always()
        env:
          MENTOR_BOT_TOKEN: ${{ secrets.MENTOR_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_MODE: ${{ steps.mode.outputs.mode }}
        run: python mentor_bot.py || true
      - name: Советник
        if: always()
        env:
          ADVISOR_BOT_TOKEN: ${{ secrets.ADVISOR_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_MODE: ${{ steps.mode.outputs.mode }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python advisor_bot.py || true
      - name: Сохранить логи
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config merge.conflictstyle merge
          git fetch origin main
          git checkout main
          git add logs/** rules.json index.html
          git diff --staged --quiet && exit 0
          git commit -m "logs $(date +%Y-%m-%d_%H%M)"
          git push origin main || \
            (git pull --strategy=ours origin main && \
             git push origin main) || true

      - name: Само-цепочка — запланировать следующий запуск
        if: always()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          CHAIN="${{ github.event.inputs.chain }}"
          if [ "$CHAIN" = "false" ]; then
            echo "Цепочка отключена для этого запуска — выход"
            exit 0
          fi
          HOUR_UTC=$(date -u +%H)
          HOUR_MSK=$(( (HOUR_UTC + 3) % 24 ))
          WEEKDAY=$(date -u +%u)
          echo "Текущее время: ${HOUR_MSK}:00 МСК, день недели: $WEEKDAY"
          if [ "$WEEKDAY" -ge 6 ]; then
            echo "Выходной — цепочка приостановлена."
            exit 0
          fi
          if [ "$HOUR_MSK" -lt 9 ] || [ "$HOUR_MSK" -ge 19 ]; then
            echo "Нерабочее время — цепочка приостановлена."
            exit 0
          fi
          echo "Рабочее время — ждём 10 минут перед следующим запуском..."
          sleep 600
          echo "Запускаем следующее звено цепочки..."
          curl -s -X POST \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/bots.yml/dispatches" \
            -d '{"ref":"main","inputs":{"mode":"auto","chain":"true"}}'
          echo "Следующее звено запущено."
